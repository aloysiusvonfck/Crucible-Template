name: Compile Kotlin Module

on:
  repository_dispatch:
    types: [compile-module]
  workflow_dispatch:
    inputs:
      code:
        description: 'Kotlin code to compile'
        required: true
        type: string
      file_name:
        description: 'Target file name'
        required: false
        default: 'GeneratedModuleContent.kt'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout template
        uses: actions/checkout@v4
        with:
          repository: aloysiusvonfck/Crucible-Template
          ref: main

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Inject gen
        run: |
          printf '%s' '${{ github.event.inputs.code || github.event.client_payload.code }}' > app/src/main/java/com/nexuside/dynamic/${{ github.event.inputs.file_name || 'GeneratedModuleContent.kt' }}
  
          # Preserve the package and imports, replace only the function body
          cat > app/src/main/java/com/nexuside/dynamic/${{ github.event.inputs.file_name || 'GeneratedModuleContent.kt' }} << 'KOTLIN_EOF'
package com.nexuside.dynamic

import androidx.compose.foundation.layout.*
import androidx.compose.material3.*
import androidx.compose.runtime.*
import androidx.compose.ui.Alignment
import androidx.compose.ui.Modifier
import androidx.compose.ui.unit.dp

@Composable
fun GeneratedModuleContent() {
${{ github.event.inputs.code || github.event.client_payload.code }}
}
KOTLIN_EOF

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
