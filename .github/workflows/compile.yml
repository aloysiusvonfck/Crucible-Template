name: Compile Kotlin Module

on:
  repository_dispatch:
    types: [compile-module]
  workflow_dispatch:
    inputs:
      code:
        description: 'Kotlin code to inject (function body only)'
        required: true
        type: string
      file_name:
        description: 'Target file name'
        required: false
        default: 'GeneratedModuleContent.kt'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout template
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Inject code
        run: |
          CODE="${{ github.event.inputs.code || github.event.client_payload.code }}"
          FILE_NAME="${{ github.event.inputs.file_name || github.event.client_payload.file_name || 'GeneratedModuleContent.kt' }}"
          node inject-code.js "$CODE" "$FILE_NAME"

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
