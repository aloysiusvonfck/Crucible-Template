name: Compile Kotlin Module

on:
  repository_dispatch:
    types: [compile-module]
  workflow_dispatch:
    inputs:
      code:
        description: 'Kotlin code to compile'
        required: true
        type: string
      file_name:
        description: 'Target file name'
        required: false
        default: 'GeneratedModuleContent.kt'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout template
        uses: actions/checkout@v4
        with:
          repository: aloysiusvonfck/Crucible-Template
          ref: main

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Inject generated code
        run: |
          CODE="${{ github.event.inputs.code || github.event.client_payload.code }}"
          FILE_NAME="${{ github.event.inputs.file_name || github.event.client_payload.file_name || 'GeneratedModuleContent.kt' }}"
          FILE_PATH="app/src/main/java/com/nexuside/dynamic/$FILE_NAME"
          
          echo "package com.nexuside.dynamic" > "$FILE_PATH"
          echo "" >> "$FILE_PATH"
          echo "import androidx.compose.foundation.layout.*" >> "$FILE_PATH"
          echo "import androidx.compose.material3.*" >> "$FILE_PATH"
          echo "import androidx.compose.runtime.*" >> "$FILE_PATH"
          echo "import androidx.compose.ui.Alignment" >> "$FILE_PATH"
          echo "import androidx.compose.ui.Modifier" >> "$FILE_PATH"
          echo "import androidx.compose.ui.unit.dp" >> "$FILE_PATH"
          echo "" >> "$FILE_PATH"
          echo "@Composable" >> "$FILE_PATH"
          echo "fun GeneratedModuleContent() {" >> "$FILE_PATH"
          echo "$CODE" >> "$FILE_PATH"
          echo "}" >> "$FILE_PATH"

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
